<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postni o‘chirish</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .post-preview {
            background: #f9f9f9;
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
            text-align: left;
        }

        .post-preview h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .post-preview p {
            margin: 0;
            color: #555;
        }

        button {
            padding: 12px 20px;
            background-color: #e74c3c;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #c0392b;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Postni o‘chirmoqchimisiz?</h2>

        <!-- Postning title va contentini ko‘rsatamiz -->
        <div class="post-preview">
            <h3>{title}</h3>
            <p>{content}</p>
        </div>

        <form method="POST" action="/delete">
            <input type="hidden" name="id" value="{id}">
            <button type="submit">❌ Postni o‘chirish</button>
        </form>

        <a href="/" class="back-link">Bekor qilish</a>
    </div>
</body>
</html>
