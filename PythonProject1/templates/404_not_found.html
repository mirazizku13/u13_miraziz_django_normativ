<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #232e45; /* фон как на GIF */
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            color: #ffffff; /* цвет текста/ссылки */
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #ffcc00; /* яркий цвет для ссылки */
            font-weight: bold;
            font-size: 18px;
            padding: 10px 20px;
            border: 2px solid #ffcc00;
            border-radius: 8px;
            transition: background 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #ffcc00;
            color: #232e45;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/therealmarbete/phpFONDrK.gif" alt="404">

        <a href="/">Bosh sahifa</a>

</body>
</html>
