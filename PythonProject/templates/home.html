<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Personal Website</title>

    <style>
        /* GENERAL */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e5e5e5;
        }

        /* HEADER */
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 30px 0;
        }

        /* CONTAINER */
        .container {
            background-color: #f5f5f5;
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        /* PHOTO */
        .photo {
            width: 150px;
            border-radius: 10px;
            margin: 10px 0;
        }

        /* LINKS */
        .links a {
            margin: 0 10px;
            color: blue;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* FORM */
        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #aaa;
        }

        textarea {
            height: 100px;
        }

        button {
            background-color: #444;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #222;
        }

        /* FOOTER */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px 0;
        }
    </style>

</head>
<body>

    <header>
        <h1>My Personal Website u13 miraziz</h1>
        <p>Welcome to my web page by miraziz</p>
    </header>

    <div class="container">
        <h2>My Photo</h2>
        <img src="https://i.pinimg.com/736x/3a/5b/71/3a5b71d496c051219ad23ff0e369d3c9.jpg" class="photo">

        <h3>My Favorite Websites</h3>
        <div class="links">
            <a href="http://127.0.0.1:8000/book/list/">book list</a>
            <a href="https://www.youtube.com/">YouTube</a>
            <a href="https://www.wikipedia.org/">Wikipedia</a>
        </div>

        <h3>Contact Me</h3>
        <form>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message"></textarea>
            <br>
            <button>Send Message</button>
        </form>
    </div>

    <footer>
        <p>© 2026 My Website By miraziz</p>
    </footer>

</body>
</html>
